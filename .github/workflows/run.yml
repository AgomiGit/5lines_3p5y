name: Daily LOHAS Update

on:
  schedule:
    # 每天台灣時間清晨 6:00 (美股收盤後) 自動執行
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許你隨時點擊按鈕手動更新

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查儲存庫代碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mpld3  # 用於將圖表轉網頁的套件

    - name: 執行五線譜運算並生成網頁
      run: python main.py

    - name: 自動部署到 GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        keep_files: false
